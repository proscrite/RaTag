# transmission_efficiency.yaml

experiment: "Grids_Transmission_Efficiency"
data_dir: "/Users/pabloherrero/sabat/RaTagging/scope_data/collection_efficiency/"

experiment: "Ra224_Transmission_Efficiency"
data_dir: "scope_data/collection_efficiency/"

# ==========================================
# 1. PLOT CONFIGURATIONS (Frontend)
# ==========================================
plots:
  collection_saturation:
    title: "Collection Saturation"
    type: "primary"
    runs: ["Run2", "Run7"]
    sweep_variable: "v_cathode" 

  braking_efficiencies:
    title: "Braking Efficiencies"
    type: "primary"
    runs: ["Run3", "Run8", "Run9", "Run10", "Run11", "Run19"]
    sweep_variable: "v_anode"

  transmission_efficiency:
    title: "Transmission Efficiency"
    type: "primary"
    runs: ["Run14", "Run15"]
    sweep_variable: "v_gate"

  transmission_efficiency_constant_ratio:
    title: "Transmission Efficiency (Constant EL/Drift Ratio)"
    type: "primary"
    runs: ["Run16", "Run17", "Run18"]
    sweep_variable: "v_gate"

  gte_vs_anode:
    title: "GTE vs Anode Voltage"
    type: "derived"
    runs: ["Run3", "Run8", "Run9", "Run10", "Run11", "Run19"]
    sweep_variable: "v_anode"

  gte_vs_el_field:
    title: "GTE vs EL Field"
    type: "derived"
    runs: ["Run3", "Run8", "Run9", "Run10", "Run11", "Run19"]
    sweep_variable: "e_el_V_cm"

  gte_vs_r_factor:
    title: "GTE vs R Factor"
    type: "derived"
    runs: ["Run3", "Run8", "Run9", "Run10", "Run11", "Run19"]
    sweep_variable: "r_factor"
  
  transparency_surface:
    title: "Physics-Informed Transparency Surface"
    type: "surface"
    runs: ["Run3", "Run8", "Run9", "Run10", "Run11", "Run19"]

